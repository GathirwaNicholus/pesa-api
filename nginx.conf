server {
    listen 80;
    server_name _;

    # ── Frontend SPA ─────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # All non-API routes serve index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy ────────────────────────────────────────────
    # Proxy /api/ and /health calls to the FastAPI service.
    # This means the browser talks to port 8080 for everything —
    # no CORS issues since both frontend and API are same origin.
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://api:8000/health;
    }

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header X-XSS-Protection        "1; mode=block";

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 1000;
}
